version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: searchx_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: searchx_db
    ports:
      - "7000:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: searchx_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "7001:80"
    depends_on:
      - db

volumes:
  db_data:
